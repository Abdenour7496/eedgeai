
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'proxy'
    metrics_path: /metrics
    static_configs:
      - targets: ['proxy:5001']

  - job_name: 'qdrant'
    metrics_path: /metrics
    static_configs:
      - targets: ['qdrant:6333']

  - job_name: 'ollama'
    metrics_path: /metrics
    static_configs:
      - targets: ['ollama:11434']

  - job_name: 'memory-server'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:4242']

  - job_name: 'neo4j'
    metrics_path: /metrics
    static_configs:
      - targets: ['neo4j-exporter:9188']

  - job_name: 'openclaw'
    metrics_path: /metrics
    static_configs:
      - targets: ['openclaw:9091']
