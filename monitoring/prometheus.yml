
# Prometheus scrape configuration
scrape_configs:
  - job_name: 'neo4j'
    static_configs:
      - targets: ['neo4j:2004']

  - job_name: 'openclaw'
    static_configs:
      - targets: ['openclaw:9091']

  - job_name: 'proxy'
    metrics_path: /metrics
    static_configs:
      - targets: ['proxy:5001']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
