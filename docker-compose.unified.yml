x-neo4j-credentials: &neo4j-creds
  NEO4J_URI: bolt://neo4j:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: ${NEO4J_PASSWORD:-test1234}

services:

  # ── Data stores ───────────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-test1234}
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  neo4j-exporter:
    build: ./neo4j-exporter
    environment:
      <<: *neo4j-creds
      NEO4J_DATABASE: neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama (local LLM) ────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment to enable NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull ${OLLAMA_MODEL:-llama3.2} &&
        ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    restart: "no"

  # ── MCP servers (SSE) — expose graph + vector DBs to OpenClaw ─────────────────

  mcp-qdrant:
    build: ./mcp-servers/qdrant
    environment:
      <<: *neo4j-creds
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: ${QDRANT_COLLECTION:-documents}
      QDRANT_MCP_HOST: 0.0.0.0
      QDRANT_MCP_PORT: "8765"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # Embedding backend — must match proxy to avoid dimension mismatch
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      DEFAULT_ACCESS_LEVEL: ${DEFAULT_ACCESS_LEVEL:-public}
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  mcp-neo4j:
    build: ./mcp-servers/neo4j
    environment:
      <<: *neo4j-creds
      NEO4J_DATABASE: neo4j
      NEO4J_MCP_SERVER_HOST: 0.0.0.0
      NEO4J_MCP_SERVER_PORT: "8766"
      DEFAULT_ACCESS_LEVEL: ${DEFAULT_ACCESS_LEVEL:-public}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  openclaw-config-init:
    image: alpine:3.20
    command:
      - /bin/sh
      - -lc
      - |
        mkdir -p /config
        cp /seed/openclaw.json /config/openclaw.json
        chown -R 1000:1000 /config
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw_config}:/config
      - ./openclaw-config/openclaw.json:/seed/openclaw.json:ro
    restart: "no"

  # ── OpenClaw + relay ──────────────────────────────────────────────────────────

  openclaw:
    build:
      context: .
      dockerfile: openclaw/Dockerfile
    depends_on:
      openclaw-config-init:
        condition: service_completed_successfully
      mcp-qdrant:
        condition: service_started
      mcp-neo4j:
        condition: service_started
    ports:
      - "18789:18799"
      - "18790:18801"
      - "9091:9091"
    environment:
      <<: *neo4j-creds
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      COPILOT_API_KEY: ${COPILOT_API_KEY:-}
      COPILOT_GITHUB_TOKEN: ${COPILOT_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_BRIDGE_PORT: ${OPENCLAW_BRIDGE_PORT:-18790}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_DOCKER_APT_PACKAGES: ${OPENCLAW_DOCKER_APT_PACKAGES:-}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw_config}:/home/node/.openclaw
      - ./openclaw-config/openclaw.json:/opt/openclaw-seed/openclaw.json:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/18799' || exit 0"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── GCOR Proxy ────────────────────────────────────────────────────────────────

  proxy:
    build: ./proxy
    ports:
      - "5001:5001"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      <<: *neo4j-creds
      # LLM backend — set LLM_BACKEND=ollama to use local models
      LLM_BACKEND: ${LLM_BACKEND:-anthropic}
      VISION_BACKEND: ${VISION_BACKEND:-anthropic}
      VISION_MODEL: ${VISION_MODEL:-claude-3-5-sonnet-20241022}
      OLLAMA_VISION_MODEL: ${OLLAMA_VISION_MODEL:-llava:7b}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-haiku-4-5-20251001}
      # GitHub Copilot
      COPILOT_API_KEY: ${COPILOT_API_KEY:-}
      COPILOT_BASE_URL: ${COPILOT_BASE_URL:-https://api.githubcopilot.com}
      COPILOT_CHAT_MODEL: ${COPILOT_CHAT_MODEL:-gpt-4.1}
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      # Embedding
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      QDRANT_TOP_K: ${QDRANT_TOP_K:-8}
      # OpenClaw backend
      OPENCLAW_BASE_URL: ${OPENCLAW_BASE_URL:-http://openclaw:18799/v1}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      # RAG switch
      ENABLE_RAG: ${ENABLE_RAG:-true}
      # Cognitive infrastructure
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.0}
      AGENT_ID: ${AGENT_ID:-}
      DEFAULT_ACCESS_LEVEL: ${DEFAULT_ACCESS_LEVEL:-public}
    volumes:
      - ./proxy/main.py:/app/main.py:ro
      - ./proxy/document_intel.py:/app/document_intel.py:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── TTS (OpenAI-compatible Edge TTS) ─────────────────────────────────────────

  tts:
    image: travisvn/openai-edge-tts:latest
    ports:
      - "5050:5050"
    environment:
      PORT: "5050"
      API_KEY: ${TTS_API_KEY:-tts-local}
      REQUIRE_API_KEY: "true"
      DEFAULT_VOICE: ${TTS_DEFAULT_VOICE:-en-US-AriaNeural}
      DEFAULT_RESPONSE_FORMAT: ${TTS_DEFAULT_FORMAT:-mp3}
      DEFAULT_SPEED: ${TTS_DEFAULT_SPEED:-1.0}
    restart: unless-stopped

  # ── OpenWebUI ─────────────────────────────────────────────────────────────────

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_BASE_URL: http://proxy:5001/v1
      OPENAI_API_KEY: openclaw
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://proxy:5001/v1
      RAG_OPENAI_API_KEY: openclaw
      ENABLE_RAG_LOCAL_WEB_FETCH: "false"
      # Ollama — fallback model when Anthropic is unavailable
      OLLAMA_BASE_URL: http://ollama:11434
      DEFAULT_MODELS: openclaw
      DEFAULT_USER_ROLE: user
      ENABLE_MODEL_FILTER: "false"
      # TTS — OpenAI-compatible Edge TTS
      AUDIO_TTS_ENGINE: openai
      AUDIO_TTS_OPENAI_API_BASE_URL: http://tts:5050/v1
      AUDIO_TTS_OPENAI_API_KEY: ${TTS_API_KEY:-tts-local}
      AUDIO_TTS_MODEL: tts-1
      AUDIO_TTS_VOICE: ${TTS_DEFAULT_VOICE:-en-US-AriaNeural}
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      proxy:
        condition: service_healthy
      ollama:
        condition: service_healthy
      tts:
        condition: service_started

  # ── Monitoring ────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/dashboard.json
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  neo4j_data:
  qdrant_data:
  openclaw_config:
  openwebui_data:
  ollama_data:
