version: "3.9"

services:

  # ── Data stores ───────────────────────────────────────────────────────────────

  neo4j:
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/test1234
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 30s

  neo4j-exporter:
    build: ./neo4j-exporter
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test1234
      NEO4J_DATABASE: neo4j
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Ollama (local LLM) ────────────────────────────────────────────────────────

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment to enable NVIDIA GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama pull ${OLLAMA_MODEL:-llama3.2} &&
        ollama pull ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
    restart: "no"

  # ── MCP servers (SSE) — expose graph + vector DBs to OpenClaw ─────────────────

  mcp-qdrant:
    build: ./mcp-servers/qdrant
    environment:
      QDRANT_URL: http://qdrant:6333
      COLLECTION_NAME: ${QDRANT_COLLECTION:-documents}
      QDRANT_MCP_HOST: 0.0.0.0
      QDRANT_MCP_PORT: "8765"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # Neo4j (needed by sync_neo4j_to_qdrant tool)
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test1234
      # Cognitive infrastructure
      DEFAULT_ACCESS_LEVEL: ${DEFAULT_ACCESS_LEVEL:-public}
    depends_on:
      qdrant:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  mcp-neo4j:
    build: ./mcp-servers/neo4j
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: test1234
      NEO4J_DATABASE: neo4j
      NEO4J_MCP_SERVER_HOST: 0.0.0.0
      NEO4J_MCP_SERVER_PORT: "8766"
      # Cognitive infrastructure
      DEFAULT_ACCESS_LEVEL: ${DEFAULT_ACCESS_LEVEL:-public}
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  # ── OpenClaw + relay ──────────────────────────────────────────────────────────

  openclaw:
    build:
      context: .
      dockerfile: openclaw/Dockerfile
    depends_on:
      - mcp-qdrant
      - mcp-neo4j
    ports:
      - "18799:18799"
      - "18801:18801"
      - "9091:9091"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_BRIDGE_PORT: ${OPENCLAW_BRIDGE_PORT:-18790}
      OPENCLAW_GATEWAY_BIND: ${OPENCLAW_GATEWAY_BIND:-lan}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_GATEWAY_PASSWORD: ${OPENCLAW_GATEWAY_PASSWORD}
      OPENCLAW_CONFIG_DIR: /home/node/.openclaw
      OPENCLAW_WORKSPACE_DIR: /home/node/.openclaw/workspace
      OPENCLAW_DOCKER_APT_PACKAGES: ${OPENCLAW_DOCKER_APT_PACKAGES:-}
      # Driver scripts
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test1234
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    volumes:
      - ${OPENCLAW_CONFIG_DIR:-openclaw_config}:/home/node/.openclaw
    restart: unless-stopped

  # ── GCOR Proxy ────────────────────────────────────────────────────────────────

  proxy:
    build: ./proxy
    ports:
      - "5001:5001"
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      # LLM backend — set LLM_BACKEND=ollama to use local models
      LLM_BACKEND: ${LLM_BACKEND:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-claude-sonnet-4-6}
      # Ollama
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      # Embedding backend — set EMBEDDING_BACKEND=ollama to use nomic-embed-text locally
      EMBEDDING_BACKEND: ${EMBEDDING_BACKEND:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      # Qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-documents}
      QDRANT_TOP_K: ${QDRANT_TOP_K:-8}
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: test1234
      # RAG switch
      ENABLE_RAG: ${ENABLE_RAG:-true}
      # Cognitive infrastructure
      CONFIDENCE_THRESHOLD: ${CONFIDENCE_THRESHOLD:-0.0}
      AGENT_ID: ${AGENT_ID:-}
      DEFAULT_ACCESS_LEVEL: ${DEFAULT_ACCESS_LEVEL:-public}
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── OpenWebUI ─────────────────────────────────────────────────────────────────

  openwebui:
    image: ghcr.io/open-webui/open-webui:latest
    ports:
      - "8080:8080"
    environment:
      OPENAI_API_BASE_URL: http://proxy:5001/v1
      OPENAI_API_KEY: openclaw
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://proxy:5001/v1
      RAG_OPENAI_API_KEY: openclaw
      ENABLE_RAG_LOCAL_WEB_FETCH: "false"
      RESET_CONFIG_ON_START: "true"
      # Ollama — lets OpenWebUI use local models directly in addition to the proxy
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - openwebui_data:/app/backend/data
    depends_on:
      proxy:
        condition: service_healthy
      ollama:
        condition: service_healthy

  # ── Monitoring ────────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/dashboard.json
      - ./monitoring/grafana-provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  neo4j_data:
  qdrant_data:
  openclaw_config:
  openwebui_data:
  ollama_data:
